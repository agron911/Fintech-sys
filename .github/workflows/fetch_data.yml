name: Weekly Data Fetch

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * 5,6'   # every Friday and Saturday at 00:00 UTC
  workflow_dispatch:         # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch script
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE \
            python scripts/run_fetch_data.py

      - name: Package and upload data as GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date +%Y-%m-%d)

          # Package raw data into a tarball
          tar -czf stock-data.tar.gz data/raw/

          SIZE=$(du -h stock-data.tar.gz | cut -f1)
          FILE_COUNT=$(find data/raw -name '*.txt' | wc -l)
          echo "Packaged ${FILE_COUNT} files (${SIZE})"

          # Delete the old "data-latest" release if it exists
          gh release delete data-latest --yes 2>/dev/null || true
          git push origin :refs/tags/data-latest 2>/dev/null || true

          # Create a new release with the tarball
          gh release create data-latest stock-data.tar.gz \
            --title "Stock Data (${DATE})" \
            --notes "Auto-updated stock price data.
          - Date: ${DATE}
          - Files: ${FILE_COUNT} stocks
          - Size: ${SIZE}

          Download: \`python scripts/download_data.py\`" \
            --latest
